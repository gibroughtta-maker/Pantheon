[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pantheon-mcp"
version = "0.1.0a0"
description = "MCP server for the Pantheon multi-agent debate framework."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Wendy" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/gibroughtta-maker/Pantheon"
Documentation = "https://gibroughtta-maker.github.io/Pantheon/mcp/"
Issues = "https://github.com/gibroughtta-maker/Pantheon/issues"
dependencies = [
    "pantheon-debate>=0.1.0a0",
    "mcp>=1.0",
]

[project.scripts]
pantheon-mcp = "pantheon_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/pantheon_mcp"]
