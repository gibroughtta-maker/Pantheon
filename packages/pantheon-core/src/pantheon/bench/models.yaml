# Model capability registry — v0 seed.
#
# Each model has a 7-dim capability vector matching the persona-skill axes.
# Numbers are hand-curated from public benchmarks where available (LiveBench,
# EQ-Bench, CMMLU, MT-Bench) and from triangulated qualitative assessment
# elsewhere — they are starting points, not measurements. PRs to refine
# them welcome (see pantheon-bench, M3 stretch).
#
# Format:
#
#   <model_id>:
#     ethics:        0.0 – 1.0     # moral reasoning quality
#     governance:    0.0 – 1.0     # political/policy reasoning
#     education:     0.0 – 1.0     # explanatory + Socratic quality
#     business:      0.0 – 1.0     # commercial/strategic reasoning
#     technology:    0.0 – 1.0     # CS / engineering reasoning
#     divination:    0.0 – 1.0     # symbolic / interpretive (largely cultural)
#     emotion:       0.0 – 1.0     # empathy / EQ
#     cultural_depth_zh: 0.0 – 1.0 # Chinese cultural fluency
#     cultural_depth_en: 0.0 – 1.0 # English cultural fluency
#
# Users may override any entry with ~/.pantheon/models.local.yaml using
# the same shape (last writer wins).

