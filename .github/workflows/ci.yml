name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --quiet 'ruff>=0.4'
      - name: ruff check
        run: ruff check packages/
      - name: ruff format --check
        run: ruff format --check packages/

  test:
    name: Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet \
            pydantic pyyaml httpx typer rich \
            pytest pytest-asyncio
          pip install --quiet -e packages/pantheon-core
          pip install --quiet 'mcp>=1.0'
          pip install --quiet -e packages/pantheon-mcp
          pip install --quiet -e packages/pantheon-pack-founders
          pip install --quiet -e packages/pantheon-divination
          pip install --quiet -e packages/pantheon-bridges

      - name: Run pytest
        run: pytest -v
        env:
          PYTHONPATH: packages/pantheon-core/src

      - name: Verify wheel builds
        run: |
          pip install --quiet build
          for pkg in packages/pantheon-core packages/pantheon-mcp \
                    packages/pantheon-pack-founders \
                    packages/pantheon-divination \
                    packages/pantheon-bridges; do
            python -m build --wheel "$pkg"
          done

  smoke:
    name: Smoke (CLI + MCP server)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install --quiet \
            pydantic pyyaml httpx typer rich pytest pytest-asyncio 'mcp>=1.0'
          pip install --quiet -e packages/pantheon-core
          pip install --quiet -e packages/pantheon-mcp

      - name: CLI smoke
        run: |
          python -m pantheon.cli list-personas
          python -m pantheon.cli debate confucius socrates naval \
            -q "Should I take the buyout?" -r 2

      - name: MCP server boots
        run: |
          # Spawn pantheon-mcp; the server should be up and idle reading stdin.
          # We don't speak the MCP wire protocol here — just verify the script
          # imports + binds cleanly.
          python -c "from pantheon_mcp.server import _build_server; \
            s, m = _build_server(); print('mcp server build ok')"
